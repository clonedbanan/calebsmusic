[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = 'autoplay=(self "https://open.spotify.com"), encrypted-media=(self "https://open.spotify.com")'

